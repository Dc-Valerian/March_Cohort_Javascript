<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f4f4f9;
      }
      form {
        background: white;
        padding: 20px;
        border-radius: 10px;
        max-width: 400px;
        margin: auto;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
      input {
        padding: 10px;
        margin: 8px 0;
        width: 100%;
        border: 2px solid #ccc;
        border-radius: 5px;
      }
      input.error {
        border: 2px solid red;
      }
      input.success {
        border: 2px solid green;
      }
      button {
        padding: 10px 15px;
        margin-top: 10px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        width: 100%;
      }
      button:hover {
        background: #0056b3;
      }
      #error {
        margin-top: 15px;
        color: red;
        font-weight: bold;
      }
      #success {
        margin-top: 15px;
        color: green;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h2>Register</h2>
    <form id="myForm">
      <label>Full Name:</label>
      <input type="text" id="fullname" placeholder="Enter your full name" />

      <label>Email:</label>
      <input type="text" id="email" placeholder="Enter your email" />

      <label>Password:</label>
      <input type="password" id="password" placeholder="Enter your password" />

      <button type="submit">Register</button>
    </form>

    <div id="error"></div>
    <div id="success"></div>

    <script src="./script.js"></script>
  </body>
</html>
